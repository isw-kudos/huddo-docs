    APP_URI: https://devconn8.internal.isw.net.au/huddo
    PATH_EDITOR: /huddo/editor
    MONGO_PROTOCOL: mongodb
    MONGO_HOST: mongo-mongodb-0.mongo-mongodb-headless.collab.svc.cluster.local:27017
    MONGO_USER: root
    MONGO_PASSWORD: password
    MONGO_PARAMS: authSource=admin&replicaSet=rs0
    S3_ENDPOINT: huddo-boards-cp-minio-service.connections.svc.cluster.local
