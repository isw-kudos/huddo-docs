    API_PAGES_ENABLE_PURGE: true
    MONGODB_URI: 'mongodb://root:password@mongo-mongodb-0.mongo-mongodb-headless.collab.svc.cluster.local:27017/wikis?authSource=admin&replicaSet=rs0'
