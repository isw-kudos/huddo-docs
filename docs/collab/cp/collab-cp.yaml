wikishift:
  ingress:
    hosts:
      - devconn8.internal.isw.net.au
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /wikishift/$1
    path: /huddo/wikishift/?(.*)
    pathType: ImplementationSpecific
  volumes:
    - name: shared-drive
      nfs:
        server: 192.168.11.62
        path: /nfs/data/shared
  volumeMounts:
    - name: shared-drive
      mountPath: /data
  envArray:
    - name: DB2_UID
      valueFrom:
        secretKeyRef:
          name: wikishift-db2 # or whatever secret name you create
          key: uid
    - name: DB2_PWD
      valueFrom:
        secretKeyRef:
          name: wikishift-db2
          key: pwd
  env:
    APP_URI: https://devconn8.internal.isw.net.au/huddo
    MONGODB_URI: 'mongodb://root:password@mongo-mongodb-0.mongo-mongodb-headless.collab.svc.cluster.local:27017/wikis?authSource=admin&replicaSet=rs0'
    MONGODB_URI_ATTACHMENTS: 'mongodb://root:password@mongo-mongodb-0.mongo-mongodb-headless.collab.svc.cluster.local:27017/attachments?authSource=admin&replicaSet=rs0'
    MONGODB_URI_DISCUSSIONS: 'mongodb://root:password@mongo-mongodb-0.mongo-mongodb-headless.collab.svc.cluster.local:27017/discussions?authSource=admin&replicaSet=rs0'
    CNX_HOSTNAME: https://devconn8.internal.isw.net.au
    DB2_HOSTNAME: dev-c8db.internal.isw.net.au
    DB2_DATABASE: WIKIS
    DB2_PORT: 50000
    # CONCURRENCY_SQL: 10
    CONCURRENCY_WIKIS: 1
    # CONCURRENCY_PAGES_PER_WIKI: 4
    # CONCURRENCY_FILES_PER_WIKI: 2
    # CONCURRENCY_COMMENTS_PER_WIKI: 8
    DEBUG: 'wikishift:*,shared:*'
    WIKIS_CONTENT_DIR: /data/wikis/upload
    # PURGE_MIGRATED_IDS: c4f52a6a-0466-419a-a88f-067f7135edd9,58026f58-f679-431c-8fc6-b523fce17ba9
    IMMEDIATELY_MIGRATE_IDS: c4f52a6a-0466-419a-a88f-067f7135edd9,58026f58-f679-431c-8fc6-b523fce17ba9
