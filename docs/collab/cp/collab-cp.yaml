attachments:
  ingress:
    hosts:
      - devconn8.internal.isw.net.au
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /attachments/$1
    path: /huddo/attachments/?(.*)
    pathType: ImplementationSpecific
  env:
    MONGODB_URI: 'mongodb://root:password@mongo-mongodb-0.mongo-mongodb-headless.collab.svc.cluster.local:27017/attachments?authSource=admin&replicaSet=rs0'
    DEBUG: 'attachments:*,shared:*,prisma:*'

discussions:
