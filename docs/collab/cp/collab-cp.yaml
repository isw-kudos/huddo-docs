x-mongo-config: &mongo-config
  volumes:
    - name: mongo-secret-vol
      secret:
        secretName: mongo-secret
        defaultMode: 420
  volumeMounts:
    - name: mongo-secret-vol
      mountPath: /etc/mongodb/x509

x-env-array: &env-array
  envArray:
    - name: CONNECTIONS_HOSTNAME
      valueFrom:
        configMapKeyRef:
          name: connections-env
          key: ic-host
    # - name: MONGO_HOSTNAME
    #   valueFrom:
    #     configMapKeyRef:
    #       name: connections-env
    #       key: mongo-name
    #       optional: true
    # - name: MONGO_REPLICA_SET_NAME
    #   valueFrom:
    #     configMapKeyRef:
    #       name: connections-env
    #       key: mongo-rs-name
    - name: REDIS_CACHE_HOST
      valueFrom:
        configMapKeyRef:
          name: connections-env
          key: redis-node-service-name
    - name: REDIS_CACHE_PORT
      valueFrom:
        configMapKeyRef:
          name: connections-env
          key: redis-node-service-port
    - name: REDIS_CACHE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: redis-secret
          key: secret
    - name: REDIS_CACHE_OPTIONS
      valueFrom:
        configMapKeyRef:
          name: connections-env
          key: redis-options

global:
  # setup authentication by following https://docs.huddo.com/boards/images/
